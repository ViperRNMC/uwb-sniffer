# Passive HRP-UWB frame-capture firmware — DWM3001CDK.

# ── DW3000 decadriver (external/dw3000) ───────────────────────────────────
CONFIG_GPIO=y
CONFIG_SPI=y
# Some DW3000 platform HALs drive the bus with the async SPI API
# (spi_transceive_signal); harmless to enable when the HAL is synchronous.
CONFIG_SPI_ASYNC=y
CONFIG_DW3000=y
CONFIG_DW3000_CHIP_DW3000=y   # DW3110 is DW3000-family silicon

# ── Console / logging / shell (all over UART0 -> onboard J-Link VCOM) ──────
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

CONFIG_LOG=y
# Immediate (synchronous) logging: per-frame lines are emitted from the DW3000
# IRQ workqueue and we want them ordered 1:1 with RX events, never dropped by a
# backlogged deferred-log ring during a fast frame burst.
CONFIG_LOG_MODE_IMMEDIATE=y
# Log through the shell backend only (below).  A standalone UART backend here
# would ALSO write the same UART, printing every line twice — keep it off.
CONFIG_LOG_BACKEND_UART=n

CONFIG_SHELL=y
CONFIG_SHELL_LOG_BACKEND=y    # the single log path: shell renders log lines on the UART
CONFIG_SHELL_STACK_SIZE=2048

# ── Runtime ───────────────────────────────────────────────────────────────
CONFIG_MAIN_STACK_SIZE=2048
# The DW3000 platform HAL submits dwt_isr() to the SYSTEM workqueue
# (k_work_submit in dw3000_hw.c), so our RX callback — SPI reads,
# dwt_readdiagnostics(), and the ~18-arg snprintf of the record line — runs on
# sysworkq.  The 1024-byte default overflows on the first RX (MPU/stack-overflow
# fault on the sysworkq thread); give it headroom.
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=1024
CONFIG_CBPRINTF_FP_SUPPORT=n  # log line is integer/hex only — keep it small
CONFIG_REBOOT=y
